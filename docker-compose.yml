services:
  animaltracker:
    image: ${ANIMALTRACKER_IMAGE:-ghcr.io/unthred/animaltracker:main}
    container_name: animaltracker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      AnimalTracker__AdminEmail: ${ANIMALTRACKER_ADMIN_EMAIL:-}
      AnimalTracker__AdminPassword: ${ANIMALTRACKER_ADMIN_PASSWORD:-}
      Email__Host: ${EMAIL_SMTP_HOST:-}
      Email__Port: ${EMAIL_SMTP_PORT:-587}
      Email__UserName: ${EMAIL_SMTP_USERNAME:-}
      Email__Password: ${EMAIL_SMTP_PASSWORD:-}
      Email__FromEmail: ${EMAIL_FROM_EMAIL:-}
      Email__FromName: ${EMAIL_FROM_NAME:-AnimalTracker}
      Email__EnableSsl: ${EMAIL_ENABLE_SSL:-true}
      Logging__LogLevel__Default: ${LOG_LEVEL_DEFAULT:-Information}
      Logging__LogLevel__Microsoft.AspNetCore: ${LOG_LEVEL_ASPNETCORE:-Warning}
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: ${LOG_LEVEL_EF_SQL:-Warning}
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Migrations: ${LOG_LEVEL_EF_MIGRATIONS:-Information}
    ports:
      # For HAProxy backend, map an internal port on UnRaid host
      - "${APP_PORT:-8085}:8080"
    volumes:
      # Persist DB + uploaded files + data protection keys
      - ${DATA_ROOT:-./data}/Data:/app/Data
      - ${DATA_ROOT:-./data}/App_Data:/app/App_Data

