services:
  animaltracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animaltracker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      AnimalTracker__AdminEmail: ${ANIMALTRACKER_ADMIN_EMAIL:-}
      AnimalTracker__AdminPassword: ${ANIMALTRACKER_ADMIN_PASSWORD:-}
    ports:
      # For HAProxy backend, map an internal port on UnRaid host
      - "${APP_PORT:-8085}:8080"
    volumes:
      # Persist DB + uploaded files + data protection keys
      - ${DATA_ROOT:-./data}/Data:/app/Data
      - ${DATA_ROOT:-./data}/App_Data:/app/App_Data

